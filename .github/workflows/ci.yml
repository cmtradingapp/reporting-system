name: CI

on:
  push:
    # test-coverage included while the TDD foundation lands; remove once merged into main.
    branches: [main, test-coverage]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  TESTING: "1"

jobs:
  lint-unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install system deps for pymssql
        run: |
          sudo apt-get update
          sudo apt-get install -y freetds-dev freetds-bin libssl-dev
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: ruff check
        run: ruff check app tests
      - name: ruff format check
        run: ruff format --check app tests
      - name: mypy
        run: mypy app
        continue-on-error: true  # progressively strict — start permissive
      - name: pytest unit + contract
        # Contract tier doesn't need a DB (TESTING=1 short-circuits app startup).
        # Run it here so coverage aggregates with unit tests in the same job.
        run: pytest tests/unit tests/contract -v --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.xml

  contract-db:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    needs: lint-unit
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: reporting_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/reporting_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y freetds-dev freetds-bin libssl-dev postgresql-client
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Seed test schema
        run: psql "$TEST_DATABASE_URL" -f tests/fixtures/schema.sql
      - name: pytest integration
        run: pytest tests/integration -v

  gui:
    name: GUI smoke + critical flows (Playwright)
    runs-on: ubuntu-latest
    needs: lint-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y freetds-dev freetds-bin libssl-dev
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: pytest gui
        run: pytest tests/gui -v
        continue-on-error: true  # GUI tier wired but empty until Phase 4
