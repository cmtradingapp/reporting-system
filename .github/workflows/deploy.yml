name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR=/opt/reporting-system/reporting-system

            # Clone or pull the repo
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              git pull origin main
            else
              mkdir -p /opt/reporting-system
              git clone https://github.com/cmtradingapp/reporting-system.git $APP_DIR
              cd $APP_DIR
            fi

            # Preserve existing .env file (already created manually on server)
            # Build and restart
            cd $APP_DIR
            docker compose down || true
            docker compose up --build -d

            echo "Deployment complete."
