<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Reporting System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; }
    .brand { font-size: 1.1rem; font-weight: 700; color: #e0e0e0; margin-bottom: 28px; text-align: center; }
    .form-control { background-color: #0f1117; border: 1px solid #30363d; color: #e0e0e0; border-radius: 8px; }
    .form-control:focus { background-color: #0f1117; border-color: #238636; color: #e0e0e0; box-shadow: 0 0 0 3px rgba(35,134,54,0.2); }
    .form-label { color: #8b949e; font-size: 0.85rem; }
    .btn-login { background: linear-gradient(135deg, #238636, #2ea043); border: none; color: #fff; font-weight: 600; border-radius: 8px; padding: 10px; width: 100%; font-size: 0.95rem; }
    .btn-login:hover { background: linear-gradient(135deg, #2ea043, #3fb950); color: #fff; }
    .error-msg { color: #f85149; font-size: 0.85rem; text-align: center; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <i class="bi bi-bar-chart-fill text-success me-2"></i>Reporting System
    </div>
    {% if error %}
    <div class="error-msg"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus />
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-login">Sign in</button>
    </form>
  </div>
</body>
</html>
